<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mimo API Proxy - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .login-box {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 48px 40px; width: 400px; text-align: center;
        }
        .login-box h1 { color: #fff; font-size: 28px; margin-bottom: 8px; }
        .login-box p { color: rgba(255,255,255,0.6); margin-bottom: 32px; font-size: 14px; }
        .login-box input {
            width: 100%; padding: 14px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
            color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        .login-box input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .login-box input::placeholder { color: rgba(255,255,255,0.3); }
        .login-box button {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
            margin-top: 16px; transition: 0.3s;
        }
        .login-box button:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
        .error { color: #f87171; font-size: 13px; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔑 mimo API Proxy</h1>
        <p>输入管理密码访问控制面板</p>
        <form method="POST" action="/admin/login">
            <input type="password" name="token" placeholder="管理密码" autofocus required>
            <button type="submit">登 录</button>
        </form>
        <div class="error" id="error"></div>
    </div>
</body>
</html>
